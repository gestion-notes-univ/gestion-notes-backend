security:
    password_hashers:
        App\Entity\Utilisateur:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/auth/login
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        register:
            pattern: ^/api/auth/register
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        # --- Routes publiques ---
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/me, roles: IS_AUTHENTICATED_FULLY }

        # --- Réclamations — spécifiques AVANT générales ---
        - { path: ^/api/reclamations/mes, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/reclamations/.+/traiter, roles: ROLE_SCOLARITE }
        - { path: ^/api/reclamations, roles: ROLE_SCOLARITE, methods: [GET] }
        - { path: ^/api/reclamations, roles: ROLE_ETUDIANT, methods: [POST] }

        # --- Notifications — spécifiques AVANT générales ---
        - { path: ^/api/notifications/envoyer, roles: ROLE_SCOLARITE }
        - { path: ^/api/notifications, roles: IS_AUTHENTICATED_FULLY }

        # --- Notes ---
        - {
              path: ^/api/notes,
              roles: ROLE_ENSEIGNANT,
              methods: [POST, PUT, DELETE],
          }
        - { path: ^/api/notes, roles: IS_AUTHENTICATED_FULLY, methods: [GET] }

        # --- Délibérations ---
        - { path: ^/api/deliberations, roles: ROLE_SCOLARITE }

        # --- Export ---
        - { path: ^/api/export/releve, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/export/pv, roles: ROLE_SCOLARITE }
        - { path: ^/api/export/notes, roles: ROLE_SCOLARITE }
        - { path: ^/api/export/deliberations, roles: ROLE_SCOLARITE }

        # --- Etudiants ---
        - { path: ^/api/etudiants, roles: ROLE_ADMIN, methods: [DELETE] }
        - { path: ^/api/etudiants, roles: ROLE_SCOLARITE, methods: [POST, PUT] }
        - {
              path: ^/api/etudiants,
              roles: IS_AUTHENTICATED_FULLY,
              methods: [GET],
          }

        # --- Enseignants ---
        - {
              path: ^/api/enseignants,
              roles: ROLE_ADMIN,
              methods: [POST, PUT, DELETE],
          }
        - {
              path: ^/api/enseignants,
              roles: IS_AUTHENTICATED_FULLY,
              methods: [GET],
          }

        # --- Filieres ---
        - {
              path: ^/api/filieres,
              roles: ROLE_ADMIN,
              methods: [POST, PUT, DELETE],
          }
        - {
              path: ^/api/filieres,
              roles: IS_AUTHENTICATED_FULLY,
              methods: [GET],
          }

        # --- Semestres ---
        - {
              path: ^/api/semestres,
              roles: ROLE_ADMIN,
              methods: [POST, PUT, DELETE],
          }
        - {
              path: ^/api/semestres,
              roles: IS_AUTHENTICATED_FULLY,
              methods: [GET],
          }

        # --- UEs ---
        - { path: ^/api/ues, roles: ROLE_ADMIN, methods: [POST, PUT, DELETE] }
        - { path: ^/api/ues, roles: IS_AUTHENTICATED_FULLY, methods: [GET] }

        # --- Utilisateurs ---
        - { path: ^/api/utilisateurs, roles: ROLE_ADMIN }

        # --- Tout le reste ---
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
