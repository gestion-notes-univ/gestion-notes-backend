parameters:
    # Chemin vers wkhtmltopdf selon ton OS
    # Linux (Ubuntu/Debian) :
    wkhtmltopdf_path: "/usr/local/bin/wkhtmltopdf"
    # macOS (Homebrew) : '/usr/local/bin/wkhtmltopdf'
    # Windows           : 'C:\Program Files\wkhtmltopdf\bin\wkhtmltopdf.exe'

services:
    # -------------------------------------------------------
    # Configuration par défaut
    # -------------------------------------------------------
    _defaults:
        autowire: true
        autoconfigure: true

    # -------------------------------------------------------
    # Chargement automatique de App\
    # -------------------------------------------------------
    App\:
        resource: "../src/"
        exclude:
            - "../src/DependencyInjection/"
            - "../src/Entity/"
            - "../src/Kernel.php"

    # -------------------------------------------------------
    # KnpSnappy — Génération PDF
    # -------------------------------------------------------
    Knp\Snappy\Pdf:
        class: Knp\Snappy\Pdf
        arguments:
            - "%wkhtmltopdf_path%"
        calls:
            - [setOption, ["encoding", "utf-8"]]
            - [setOption, ["no-outline", true]]
            - [setOption, ["disable-smart-shrinking", true]]

    # Alias pour l'injection dans ExportController
    knp_snappy.pdf:
        alias: Knp\Snappy\Pdf
        public: true

    # -------------------------------------------------------
    # Services métier (séparés des controllers)
    # -------------------------------------------------------

    # Service de calcul des notes et moyennes
    App\Service\NoteService:
        arguments:
            - "@doctrine.orm.entity_manager"

    # Service de délibération
    App\Service\DeliberationService:
        arguments:
            - "@doctrine.orm.entity_manager"

    # Service de notifications
    App\Service\NotificationService:
        arguments:
            - "@doctrine.orm.entity_manager"

    # Service d'export PDF
    App\Service\ExportService: ~
